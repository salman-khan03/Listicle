<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="'Inter', system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a0033"/>
      <stop offset="55%" stop-color="#2d0a4e"/>
      <stop offset="100%" stop-color="#0a0118"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="38%" r="60%">
      <stop offset="0%" stop-color="#ff2e9a" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#ff2e9a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="neon" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00f0ff"/>
      <stop offset="50%" stop-color="#ff2e9a"/>
      <stop offset="100%" stop-color="#ffd23f"/>
    </linearGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="6"/></filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)"/>
  <rect width="800" height="500" fill="url(#glow)"/>

  <!-- Equalizer bars along the bottom -->
  <g fill="#00f0ff" opacity="0.85">
    <rect x="40"  y="420" width="16" height="60"  rx="3"/>
    <rect x="64"  y="390" width="16" height="90"  rx="3"/>
    <rect x="88"  y="440" width="16" height="40"  rx="3"/>
    <rect x="112" y="360" width="16" height="120" rx="3"/>
    <rect x="136" y="410" width="16" height="70"  rx="3"/>
  </g>
  <g fill="#ff2e9a" opacity="0.85">
    <rect x="648" y="400" width="16" height="80"  rx="3"/>
    <rect x="672" y="350" width="16" height="130" rx="3"/>
    <rect x="696" y="430" width="16" height="50"  rx="3"/>
    <rect x="720" y="380" width="16" height="100" rx="3"/>
    <rect x="744" y="415" width="16" height="65"  rx="3"/>
  </g>

  <!-- Left speaker -->
  <g transform="translate(70,150)">
    <rect x="0" y="0" width="120" height="200" rx="12" fill="#120024" stroke="#ff2e9a" stroke-width="3"/>
    <circle cx="60" cy="60"  r="40" fill="#0a0118" stroke="#00f0ff" stroke-width="4"/>
    <circle cx="60" cy="60"  r="16" fill="#ff2e9a"/>
    <circle cx="60" cy="150" r="26" fill="#0a0118" stroke="#00f0ff" stroke-width="3"/>
    <circle cx="60" cy="150" r="9"  fill="#ffd23f"/>
  </g>

  <!-- Right speaker -->
  <g transform="translate(610,150)">
    <rect x="0" y="0" width="120" height="200" rx="12" fill="#120024" stroke="#ff2e9a" stroke-width="3"/>
    <circle cx="60" cy="60"  r="40" fill="#0a0118" stroke="#00f0ff" stroke-width="4"/>
    <circle cx="60" cy="60"  r="16" fill="#ff2e9a"/>
    <circle cx="60" cy="150" r="26" fill="#0a0118" stroke="#00f0ff" stroke-width="3"/>
    <circle cx="60" cy="150" r="9"  fill="#ffd23f"/>
  </g>

  <!-- Center turntable / vinyl record -->
  <g transform="translate(400,250)">
    <circle r="92" fill="#ff2e9a" opacity="0.25" filter="url(#blur)"/>
    <circle r="80" fill="#0a0118" stroke="#2d0a4e" stroke-width="2"/>
    <circle r="68" fill="none" stroke="#3a1560" stroke-width="2"/>
    <circle r="56" fill="none" stroke="#3a1560" stroke-width="2"/>
    <circle r="44" fill="none" stroke="#3a1560" stroke-width="2"/>
    <circle r="30" fill="#ff2e9a"/>
    <circle r="6"  fill="#0a0118"/>
  </g>

  <!-- Title -->
  <text x="400" y="120" text-anchor="middle" font-size="92" font-weight="900" fill="url(#neon)" letter-spacing="4">808</text>
  <text x="400" y="170" text-anchor="middle" font-size="40" font-weight="800" fill="#ffffff" letter-spacing="8">BLOCK PARTY</text>

  <!-- Lineup -->
  <text x="400" y="410" text-anchor="middle" font-size="20" font-weight="600" fill="#00f0ff" letter-spacing="2">DJ VERSE · LYRIC LOUD · MAYA SOL</text>
  <text x="400" y="440" text-anchor="middle" font-size="16" fill="#cbb6e6" letter-spacing="3">WAREHOUSE 9 · LIVE HIP-HOP</text>
</svg>
